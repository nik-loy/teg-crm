name: Daily Follow-Up Reminders

on:
  schedule:
    - cron: '0 7 * * 1-5'  # 07:00 UTC Mon–Fri
  workflow_dispatch:

jobs:
  send-reminders:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run follow-up reminder bot
        run: python -m src.reminders.follow_up_bot
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_CONTACTS_DB_ID: ${{ secrets.NOTION_CONTACTS_DB_ID }}
          NOTION_COMPANIES_DB_ID: ${{ secrets.NOTION_COMPANIES_DB_ID }}
          NOTION_EVENTS_DB_ID: ${{ secrets.NOTION_EVENTS_DB_ID }}
          NOTION_ATTENDANCE_DB_ID: ${{ secrets.NOTION_ATTENDANCE_DB_ID }}
          NOTION_INTERACTIONS_DB_ID: ${{ secrets.NOTION_INTERACTIONS_DB_ID }}
          NOTION_SPEAKERS_DB_ID: ${{ secrets.NOTION_SPEAKERS_DB_ID }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
