# docker-compose.yml — TEG CRM
# Works with `podman compose` (uses docker-compose.exe under the hood on Windows).
#
# ─── Quick Start ───────────────────────────────────────────────────────────────
#  1. Copy teg-crm-web/.env.local.example  →  teg-crm-web/.env.local
#     Fill in your real Notion token, Gemini key, etc.
#
#  2. First run (builds the image):
#       podman compose up --build -d
#
#  3. Open http://localhost:3000  →  enter APP_PASSWORD
#
#  4. Stop:
#       podman compose down
#
#  5. After a code change, rebuild:
#       podman compose up --build -d
# ───────────────────────────────────────────────────────────────────────────────

services:
  teg-crm:
    image: localhost/teg-crm:latest
    build:
      context: ./teg-crm
      dockerfile: Dockerfile
    container_name: teg-crm
    ports:
      - "8000:8000"
    environment:
      - DJANGO_DEBUG=True
      - DJANGO_ALLOWED_HOSTS=localhost,127.0.0.1,0.0.0.0,teg-crm
      - DATA_DIR=/app/data
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    volumes:
      - crm-data:/app/data
    restart: unless-stopped

  teg-crm-web:
    image: localhost/teg-crm-web:latest
    build:
      context: ./teg-crm-web
      dockerfile: Dockerfile
    container_name: teg-crm-web
    ports:
      - "3000:3000"
    depends_on:
      - teg-crm
    env_file:
      # Real secrets loaded from this file — never committed to git
      - ./teg-crm-web/.env.local
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOSTNAME=0.0.0.0
      - NEXT_PUBLIC_BACKEND_URL=http://localhost:8000
      - BACKEND_URL=http://10.89.0.1:8000
    volumes:
      # Persist SQLite database / state if needed, sharing the volume mount.
      - crm-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/login"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  crm-data:
    # Named volume — survives `podman compose down` and image rebuilds.
    # Only deleted by explicit `podman volume rm crm-data`.
