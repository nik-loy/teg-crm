name: Weekly Pipeline Report

on:
  schedule:
    - cron: '0 8 * * 1'  # 08:00 UTC every Monday
  workflow_dispatch:

jobs:
  send-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate and send weekly pipeline report
        run: python -m src.reports.weekly_report
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_CONTACTS_DB_ID: ${{ secrets.NOTION_CONTACTS_DB_ID }}
          NOTION_COMPANIES_DB_ID: ${{ secrets.NOTION_COMPANIES_DB_ID }}
          NOTION_EVENTS_DB_ID: ${{ secrets.NOTION_EVENTS_DB_ID }}
          NOTION_ATTENDANCE_DB_ID: ${{ secrets.NOTION_ATTENDANCE_DB_ID }}
          NOTION_INTERACTIONS_DB_ID: ${{ secrets.NOTION_INTERACTIONS_DB_ID }}
          NOTION_SPEAKERS_DB_ID: ${{ secrets.NOTION_SPEAKERS_DB_ID }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
